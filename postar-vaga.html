<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knots - Anunciar</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="imgs/logoicon1.ico">
</head>
<body>
    <nav>
        <div class="container-nav">
            <a href="index.html"><img src="imgs/knots_logo1.svg" width="100"></a>
            <div class="search-container">
                <input type="text" placeholder="Buscar vagas" class="search-input">
                <a href="busca.html"><i class="fa-solid fa-magnifying-glass search-icon"></i></a>
            </div>
            <a href="postar-vaga.html">Anunciar</a>
            <span>|</span>
            <a href="#">Login</a>
            <a href="perfil-candidato.html"><img src="imgs/icone-perfil.svg" width="50"></a>
        </div>
    </nav>

    <main class="pagina-postar-vaga">
        <div class="container-anuncio-titulo">
        <h1>Anunciar Vaga</h1>

        <div class="import-options">
            <button type="button" class="btn-import btn-linkedin">
                <i class="fa-brands fa-linkedin"></i> Importar vaga LinkedIn
            </button>
            <button type="button" class="btn-import btn-infojobs">
                <i class="fa-solid fa-briefcase"></i> Importar vaga Infojobs
            </button>
        </div>

        <div class="separator">ou preencha manualmente</div>
        
        <form action="#">
            <div class="form-group">
                <label label-postar-vaga for="titulo">Título da Vaga</label>
                <input type="text" id="titulo" placeholder="Ex: Desenvolvedor Front-end" class="input-titulo" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="label-postar-vaga" for="local">Local</label>
                    <input type="text" id="local" placeholder="Cidade - UF" class="input-titulo" required>
                </div>
                <div class="form-group">
                    <label class="label-postar-vaga" for="escala">Escala</label>
                    <select id="escala">
                        <option value="5x2">5x2</option>
                        <option value="6x1">6x1</option>
                        <option value="4x3">4x3</option>
                        <option value="12x36">12x36</option>
                        <option value="12x36">Flexível</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="label-postar-vaga" for="modalidade">Modalidade</label>
                <select id="modalidade">
                    <option value="presencial">Presencial</option>
                    <option value="hibrido">Híbrido</option>
                    <option value="remoto">Remoto</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label-postar-vaga" for="contrato">Contrato</label>
                <select id="contrato">
                    <option value="clt">CLT</option>
                    <option value="pj">PJ</option>
                    <option value="estagio">Estágio</option>
                    <option value="temporario">Temporário</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label-postar-vaga" for="setor">Setor</label>
                <select id="setor">
                    <option value="administrativo">Administrativo</option>
                    <option value="ti">T.I (Tecnologia da Informação)</option>
                    <option value="producao">Produção</option>
                    <option value="vendas">Vendas</option>
                    <option value="logistica">Logística</option>
                    <option value="qualidade">Qualidade</option>
                    <option value="manutencao">Manutenção</option>
                    <option value="rh">R.H (Recursos Humanos)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="label-postar-vaga" for="requisitos">Requisitos</label>
                <textarea id="requisitos" rows="3" placeholder="Liste as habilidades necessárias..."></textarea>
            </div>

            <div class="form-group">
                <label class="label-postar-vaga" for="descricao">Descrição da Vaga</label>
                <textarea id="descricao" rows="5" placeholder="Detalhes sobre as atividades..."></textarea>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="post_linkedin"> 
                    Publicar também no LinkedIn
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="post_infojobs"> 
                    Publicar também na Infojobs
                </label>
            </div>

            <button type="submit" class="btn-submit">Publicar Vaga</button>
        </form>
    </div>
    </main>

    <footer>
        <span>Desenvolvido por grupo Knots, 2026</span>
    </footer>
</body>
</html>
